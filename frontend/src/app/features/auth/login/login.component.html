<div class="auth-page">
  <div class="auth-shell">
    <div class="auth-left">
      <div class="welcome">
        <div class="welcome-kicker">MCM</div>
        <h1>Üdv az MCM-en!</h1>
        <p>
          Jelentkezz be a fiókodba, és folytasd a vásárlást pár kattintással.
        </p>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-card">
        <h2>Bejelentkezés</h2>

        <div class="field">
          <input [(ngModel)]="username" type="text" placeholder="Felhasználónév" autocomplete="username" />
        </div>

        <div class="field">
          <input [(ngModel)]="password" type="password" placeholder="Jelszó" autocomplete="current-password" />
        </div>

        <label class="remember">
          <input type="checkbox" [(ngModel)]="remember" />
          <span>Emlékezz rám</span>
        </label>

        <button class="primary" type="button" (click)="submit()">Belépés</button>

        <div class="msg" *ngIf="message">{{ message }}</div>

        <p class="bottom">
          Nincs még fiókod? <a routerLink="/register">Regisztráció</a>
        </p>
      </div>
    </div>
  </div>
</div>
